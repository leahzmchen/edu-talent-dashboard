<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>达人看板 - 内部工具</title>
<style>
:root {
  --primary: #4F46E5;
  --primary-light: #818CF8;
  --primary-bg: #EEF2FF;
  --primary-dark: #3730A3;
  --success: #10B981;
  --warning: #F59E0B;
  --danger: #EF4444;
  --info: #3B82F6;
  --orange: #F97316;
  --gray-50: #F9FAFB;  --gray-100: #F3F4F6;  --gray-200: #E5E7EB;
  --gray-300: #D1D5DB;  --gray-400: #9CA3AF;  --gray-500: #6B7280;
  --gray-600: #4B5563;  --gray-700: #374151;  --gray-800: #1F2937;
  --gray-900: #111827;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
  background: var(--gray-50); color: var(--gray-800); min-height: 100vh;
}

/* ===== Header ===== */
.header {
  background: linear-gradient(135deg, var(--primary) 0%, #7C3AED 100%);
  color: white; padding: 24px 32px; box-shadow: 0 4px 20px rgba(79,70,229,0.3);
}
.header h1{font-size:26px;font-weight:700;}
.header p{font-size:14px;opacity:.85;margin-top:4px;}
.header-summary{font-size:13px;opacity:.92;margin-top:6px;line-height:1.5;}
.header-stats{display:flex;gap:20px;margin-top:16px;flex-wrap:wrap;}
.stat-item{background:rgba(255,255,255,.15);padding:10px 18px;border-radius:10px;text-align:center;}
.stat-item .num{font-size:26px;font-weight:700;display:block;line-height:1.2;}
.stat-item .label{font-size:12px;opacity:.85;margin-top:2px;}

.main{max-width:1440px;margin:0 auto;padding:24px;}

/* ===== 筛选区域 ===== */
.filter-section{
  background:white;border-radius:12px;box-shadow:0 1px 3px rgba(0,0,0,.08);
  margin-bottom:20px;overflow:hidden;
}
.talent-filters{
  display:flex;gap:12px;padding:16px 24px;background:#F8FAFC;
  border-bottom:1px solid var(--gray-100);flex-wrap:wrap;align-items:center;
}
.filter-group{display:flex;flex-direction:column;gap:4px;min-width:120px;}
.filter-group label{font-size:11px;color:var(--gray-500);font-weight:500;padding-left:2px;}
.filter-group select,.filter-group input{
  border:1px solid var(--gray-200);border-radius:8px;padding:8px 12px;
  font-size:13px;color:var(--gray-700);background:white;outline:none;transition:all .2s;
  min-width:130px;height:38px;
}
.filter-group select:focus,.filter-group input:focus{
  border-color:var(--primary);box-shadow:0 0 0 3px rgba(79,70,229,.1);
}
.filter-search{flex:1;min-width:200px;max-width:280px;}
.filter-search input{width:100%;}

.result-info{font-size:13px;color:var(--gray-500);margin-left:auto;font-weight:500;white-space:nowrap;}
.btn-reset{
  padding:8px 18px;font-size:13px;font-weight:500;border-radius:8px;cursor:pointer;
  transition:all .2s;border:1px solid var(--gray-200);background:white;color:var(--gray-600);
}
.btn-reset:hover{background:var(--gray-50);border-color:var(--gray-300);}

/* ===== 表格 ===== */
.table-wrapper{overflow-x:auto;background:white;border-radius:0 0 12px 12px;}
.talent-table{width:100%;border-collapse:collapse;min-width:1300px;}
.talent-table thead th{
  position:sticky;top:0;z-index:10;background:linear-gradient(180deg,#F8FAFC,var(--gray-50));
  padding:11px 14px;font-size:12px;font-weight:600;color:var(--gray-500);
  text-align:left;border-bottom:2px solid var(--gray-200);white-space:nowrap;
  user-select:none;
}
.talent-table thead th.sortable{cursor:pointer;transition:color .2s;}
.talent-table thead th.sortable:hover{color:var(--primary);}
.talent-table thead th.sorted-asc::after{content:' \u2191';color:var(--primary);}
.talent-table thead th.sorted-desc::after{content:' \u2193';color:var(--primary);}

.talent-table tbody td{
  padding:10px 14px;font-size:13px;border-bottom:1px solid var(--gray-100);
  color:var(--gray-700);vertical-align:middle;max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}
.talent-table tbody tr{transition:background .15s;}
.talent-table tbody tr:hover{background:#EEF2FF;}
.talent-table tbody tr.expanded{background:#EDE9FE;}
.talent-table tbody tr.expanded:hover{background:#DDD6FE;}

/* 表格内标签 */
.level-tag{display:inline-block;padding:2px 10px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:.5px;}
.level-A{background:linear-gradient(135deg,#FBBF24,#F59E0B);color:#1a1a2e;}
.level-B{background:linear-gradient(135deg,#3B82F6,#2563eb);color:white;}
.level-C{background:linear-gradient(135deg,#22c55e,#16a34a);color:white;}
.level-D{background:linear-gradient(135deg,#94a3b8,#64748b);color:white;}
.level-E{background:linear-gradient(135deg,#a78bfa,#8b5cf6);color:white;}

.tag-inline{display:inline-block;padding:1px 8px;background:#EEF2FF;color:#4338CA;border-radius:4px;font-size:11.5px;margin:1px 3px 1px 0;white-space:normal;word-break:break-all;}

/* 更多详情按钮 */
.btn-detail{
  display:inline-flex;align-items:center;gap:4px;
  padding:4px 12px;font-size:11.5px;font-weight:600;border-radius:6px;
  cursor:pointer;transition:all .2s;white-space:nowrap;
  border:1px solid rgba(79,70,229,.25);background:var(--primary-bg);color:var(--primary);
}
.btn-detail:hover{background:#DEDFFE;transform:translateY(-1px);box-shadow:0 3px 8px rgba(79,70,229,.15);}
.btn-detail.expanded{background:var(--primary);color:white;border-color:var(--primary);}

/* 来源标签 */
.source-tag{
  display:inline-block;padding:2px 10px;border-radius:4px;font-size:11.5px;font-weight:500;
}

/* ===== 详情面板（展开行） ===== */
.detail-row{display:none;background:linear-gradient(135deg,#FBFAFE,#F5F3FF);}
.detail-row.show{display:table-row;}
.detail-cell{padding:16px 24px!important;vertical-align:top!important;white-space:normal!important;overflow:visible!important;}
.detail-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:6px 28px;}
.detail-field{display:flex;justify-content:space-between;align-items:flex-start;padding:7px 0;border-bottom:1px dashed rgba(148,163,184,.2);}
.detail-label{color:var(--gray-500);font-size:12.5px;white-space:nowrap;flex-shrink:0;margin-right:10px;min-width:90px;}
.detail-value{color:var(--gray-800);font-size:12.5px;text-align:right;word-break:break-all;font-weight:500;}

/* 详情来源标签（区分sheet） */
.detail-source-badge{
  display:inline-block;padding:3px 10px;border-radius:6px;font-size:11.5px;font-weight:600;margin-bottom:10px;
}
.detail-source-history{background:#DBEAFE;color:#1E40AF;}
.detail-source-camp{background:#D1FAE5;color:#065F46;}
.detail-source-extra{background:#FEF3C7;color:#92400E;}

.detail-actions{
  display:flex;align-items:center;justify-content:end;gap:10px;
  padding:12px 24px 0;border-top:1px solid var(--gray-200);margin-top:8px;
}
.btn-copy{
  padding:7px 16px;font-size:12px;font-weight:500;border-radius:8px;cursor:pointer;
  border:1px solid rgba(79,70,229,.25);background:var(--primary-bg);color:var(--primary);
  transition:all .2s;
}
.btn-copy:hover{background:#DEDFFE;transform:translateY(-1px);box-shadow:0 3px 10px rgba(79,70,229,.15);}

/* ===== 空状态 & 加载 ===== */
.empty-state{text-align:center;padding:60px 20px;color:var(--gray-400);background:white;border-radius:0 0 12px 12px;}
.empty-icon{font-size:48px;margin-bottom:12px;opacity:.5;}
.loading-state{text-align:center;padding:60px 20px;color:var(--gray-400);background:white;border-radius:0 0 12px 12px;}
.spinner{width:36px;height:36px;border:3px solid var(--gray-200);border-top-color:var(--primary);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 16px;}
@keyframes spin{to{transform:rotate(360deg);}}

/* ===== Footer ===== */
.footer{text-align:center;padding:20px;color:var(--gray-400);font-size:12.5px;border-top:1px solid var(--gray-200);margin-top:32px;}

/* ===== Toast ===== */
.toast{
  position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(20px);
  background:var(--success);color:white;padding:10px 24px;border-radius:10px;
  font-size:14px;font-weight:500;opacity:0;transition:all .3s;z-index:9999;pointer-events:none;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* ===== 响应式 ===== */
@media(max-width:768px){
  .header{padding:18px 16px;} .header h1{font-size:20px;}
  .main{padding:16px;}
  .talent-filters{padding:12px 16px;gap:8px;}
  .filter-group{min-width:100px;}
  .filter-group select,.filter-group input{min-width:100px;font-size:12px;padding:6px 10px;height:34px;}
  .header-stats{gap:12px;} .stat-item{padding:8px 12px;} .stat-item .num{font-size:20px;}
  .detail-grid{grid-template-columns:1fr;}
}

::-webkit-scrollbar{width:6px;height:6px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--gray-300);border-radius:3px;}
::-webkit-scrollbar-thumb:hover{background:var(--gray-400);}
</style>
</head>
<body>

<!-- Header -->
<header class="header">
  <h1>📊 达人看板 <span style="font-size:14px;font-weight:400;opacity:.75;">· 内部自用</span></h1>
  <p class="header-summary">历史沉淀 + 创造营建联 + 销售新增 · 合并展示 · 根据需求筛选匹配达人</p>
  <div class="header-stats" id="headerStats"></div>
</header>

<main class="main">

<!-- 筛选 + 表格 -->
<div class="filter-section">
  <!-- 筛选器 -->
  <div class="talent-filters">
    <div class="filter-group"><label>达人来源</label><select id="fSource"><option value="">全部</option></select></div>
    <div class="filter-group"><label>等级</label><select id="fLevel"><option value="">全部</option></select></div>
    <div class="filter-group"><label>流转策略</label><select id="fStrategy"><option value="">全部</option></select></div>
    <div class="filter-group"><label>达人标签</label><select id="fTags"><option value="">全部</option></select></div>
    <div class="filter-group"><label>合作类型</label><select id="fCoopType"><option value="">全部</option></select></div>
    <div class="filter-group"><label>带货类型</label><select id="fSaleType"><option value="">全部</option></select></div>
    <div class="filter-group"><label>撮合状态</label><select id="fMatchStatus"><option value="">全部</option></select></div>
    <div class="filter-group filter-search"><label>搜索</label><input type="text" id="fSearch" placeholder="达人IP、账号、销售..." oninput="applyFilters()"></div>
    <span class="result-info" id="resultInfo"></span>
    <button class="btn-reset" onclick="resetFilters()">🔄 重置</button>
  </div>

  <!-- 表格 -->
  <div class="table-wrapper">
    <table class="talent-table" id="talentTable">
      <thead><tr id="tableHead"></tr></thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>

  <!-- 空状态 -->
  <div class="empty-state" id="emptyState" style="display:none;">
    <div class="empty-icon">🔍</div>
    <p style="font-size:16px;color:var(--gray-600)">没有找到匹配的达人</p>
    <p style="font-size:13px;margin-top:6px;">尝试调整筛选条件或搜索关键词</p>
  </div>

  <!-- 加载状态 -->
  <div class="loading-state" id="loadingState">
    <div class="spinner"></div>
    <p>正在加载数据...</p>
  </div>
</div>

</main>

<footer class="footer">达人看板 · 数据来源：双轨合并本地版 · 静态部署</footer>

<div class="toast" id="toast">✅ 已复制到剪贴板</div>

<script>
// ============================================================
// 全局数据与配置
// ============================================================

let allData = [];       // 所有数据合并
let expandedId = null;

// 表格列定义：13个展示字段 + 操作列
const TABLE_COLS = [
  { key: '达人来源',     label: '来源',       width: '85px',   isSource: true },
  { key: '达人IP',       label: '达人IP',     width: '',       sortable: true },
  { key: '等级',         label: '等级',       width: '65px',   isLevel: true },
  { key: '流转策略',     label: '流转策略',   width: '95px' },
  { key: '销售归属',     label: '销售归属',   width: '130px' },
  { key: '达人标签',     label: '达人标签',   width: '170px',  isTag: true },
  { key: '粉丝画像',     label: '粉丝画像',   width: '110px' },
  { key: '合作类型',     label: '合作类型',   width: '95px' },
  { key: '带货类型',     label: '带货类型',   width: '95px' },
  { key: '图书类目倾向', label: '图书类目',   width: '90px' },
  { key: '课程类目倾向', label: '课程类目',   width: '90px' },
  { key: '带货单价',     label: '单价',       width: '75px' },
  { key: '撮合状态',     label: '撮合状态',   width: '90px' },
  // 最后一列：操作
];

// ============================================================
// 初始化
// ============================================================
async function init() {
  try {
    const [h, c, e] = await Promise.all([
      fetch('./data/data_history.json').then(r=>r.json()).catch(()=>({data:[],options:{}})),
      fetch('./data/data_camp.json').then(r=>r.json()).catch(()=>({data:[],options:{}})),
      fetch('./data/data_extra.json').then(r=>r.json()).catch(()=>({data:[],options:{}}))
    ]);

    // 合并所有数据为一个大数组
    allData = [...h.data, ...c.data, ...e.data];

    // 统计
    const sourceCount = {};
    allData.forEach(r => { sourceCount[r['达人来源']] = (sourceCount[r['达人来源']]||0) + 1; });

    document.getElementById('headerStats').innerHTML =
      `<div class="stat-item"><span class="num">${allData.length}</span><span class="label">总计达人</span></div>` +
      Object.entries(sourceCount).map(([k,v]) =>
        `<div class="stat-item"><span class="num">${v}</span><span class="label">${k}</span></div>`
      ).join('');

    // 构建筛选选项（从合并数据中提取）
    buildFilterOptions(allData);

    // 渲染表头和表格
    renderHead();
    applyFilters();

    // 绑定事件
    ['fSource','fLevel','fStrategy','fTags','fCoopType','fSaleType','fMatchStatus'].forEach(id => {
      document.getElementById(id).addEventListener('change', () => applyFilters());
    });

    document.getElementById('loadingState').style.display = 'none';
  } catch(e) {
    console.error('初始化失败:', e);
    document.getElementById('loadingState').innerHTML =
      '<div class="empty-state"><div class="empty-icon">❌</div>' +
      '<p style="color:var(--danger)">数据加载失败</p><p style="font-size:13px">'+e.message+'</p></div>';
  }
}

// 需要拆分为独立选项的多值字段
const MULTI_VALUE_FIELDS = ['合作类型','带货类型','达人标签','图书类目倾向','课程类目倾向'];

function buildFilterOptions(data) {
  // 单值字段：直接取唯一值
  const extractUnique = (field) =>
    [...new Set((data||[]).map(r => r[field]).filter(Boolean))].sort();

  // 多值字段：先拆分每个单元格的复合值，再取去重后的独立选项
  const extractSplitUnique = (field) => {
    const tagSplitRegex = /[,、/|；;\u3001;]/;
    const allValues = new Set();
    (data||[]).forEach(r => {
      const val = r[field];
      if (val) val.split(tagSplitRegex).forEach(v => { v=v.trim(); if(v) allValues.add(v); });
    });
    return [...allValues].sort();
  };

  rebuildSelect('fSource', extractUnique('达人来源'));
  rebuildSelect('fLevel', extractUnique('等级'));
  rebuildSelect('fStrategy', extractUnique('流转策略'));
  rebuildSelect('fTags', extractSplitUnique('达人标签'));
  rebuildSelect('fCoopType', extractSplitUnique('合作类型'));
  rebuildSelect('fSaleType', extractSplitUnique('带货类型'));
  rebuildSelect('fMatchStatus', extractUnique('撮合状态'));
}

function rebuildSelect(id, options) {
  const el = document.getElementById(id);
  el.innerHTML = '<option value="">全部</option>';
  (options || []).forEach(v => {
    const o = document.createElement('option');
    o.value = v; o.textContent = v;
    el.appendChild(o);
  });
}

// ============================================================
// 筛选逻辑
// ============================================================
function getFilteredData() {
  const fSource = document.getElementById('fSource').value;
  const level = document.getElementById('fLevel').value;
  const strategy = document.getElementById('fStrategy').value;
  const tags = document.getElementById('fTags').value;
  const coopType = document.getElementById('fCoopType').value;
  const saleType = document.getElementById('fSaleType').value;
  const matchStatus = document.getElementById('fMatchStatus').value;
  const q = (document.getElementById('fSearch').value || '').trim().toLowerCase();

  return allData.filter(r => {
    if (fSource && r['达人来源'] !== fSource) return false;
    if (level && r['等级'] !== level) return false;
    if (strategy && !String(r['流转策略']||'').includes(strategy)) return false;
    if (tags && !String(r['达人标签']||'').includes(tags)) return false;
    if (coopType && !String(r['合作类型']||'').includes(coopType)) return false;
    if (saleType && !String(r['带货类型']||'').includes(saleType)) return false;
    if (matchStatus && !String(r['撮合状态']||'').includes(matchStatus)) return false;
    if (q) {
      const searchFields = ['达人IP','视频号账号','达人标签','粉丝画像','销售归属','达人来源','撮合客户'];
      const text = searchFields.map(f => String(r[f]||'').toLowerCase()).join(' ');
      if (!text.includes(q)) return false;
    }
    return true;
  });
}

function applyFilters() {
  const filtered = getFilteredData();
  renderBody(filtered);
  document.getElementById('resultInfo').textContent =
    filtered.length !== allData.length ? `筛选结果：${filtered.length} / ${allData.length}` : `共 ${allData.length} 条`;
  document.getElementById('emptyState').style.display = filtered.length ? 'none' : '';
}

function resetFilters() {
  document.getElementById('fSearch').value = '';
  ['fSource','fLevel','fStrategy','fTags','fCoopType','fSaleType','fMatchStatus'].forEach(id => {
    document.getElementById(id).value = '';
  });
  applyFilters();
}

// ============================================================
// 渲染表格
// ============================================================
function renderHead() {
  let html = TABLE_COLS.map(c =>
    `<th class="${c.sortable?'sortable':''}" ${c.width?'style="width:'+c.width+'"':''} data-col="${c.key}">${esc(c.label)}</th>`
  ).join('');
  html += '<th style="width:90px;text-align:center;">更多详情</th>'; // 操作列
  document.getElementById('tableHead').innerHTML = html;

  document.querySelectorAll('#tableHead th.sortable').forEach(th => {
    th.onclick = () => sortBy(th.dataset.col);
  });
}

function renderBody(records) {
  const tbody = document.getElementById('tableBody');
  if (!records || records.length === 0) {
    tbody.innerHTML = '';
    return;
  }

  const tagSplitRegex = /[,、/|；;\u3001;]/;

  tbody.innerHTML = records.map(r => {
    const isExpanded = expandedId === r._id;

    // 数据单元格
    let cells = TABLE_COLS.map(c => {
      let val = r[c.key] || '';
      if (c.isLevel) {
        return `<td>${val ? '<span class="level-tag level-'+val+'">'+esc(val)+'</span>' : '-'}</td>`;
      } else if (c.isTag && val) {
        const tags = val.split(tagSplitRegex).map(t=>t.trim()).filter(Boolean).slice(0,4);
        return `<td>${tags.map(t=>'<span class="tag-inline">'+esc(t)+'</span>').join('')}${tags.length<val.split(tagSplitRegex).length?'<span style="font-size:11px;color:var(--gray-400)">...</span>':''}</td>`;
      } else if (c.isSource) {
        const colors = {'历史在投':'#DBEAFE;color:#1E40AF','创造营':'#D1FAE5;color:#065F46','销售新增':'#FEF3C7;color:#92400E'};
        const sc = colors[val] || '#F3F4F6;color:var(--gray-700)';
        return `<td><span class="source-tag" style="background:${sc}">${esc(val)}</span></td>`;
      } else {
        return `<td title="${esc(val)}">${esc(val)||'-'}</td>`;
      }
    }).join('');

    // 更多详情按钮列
    cells += `<td style="text-align:center;">
      <button class="btn-detail ${isExpanded?'expanded':''}" onclick="event.stopPropagation();toggleExpand(${r._id})">
        ${isExpanded?'▲ 收起详情':'▼ 更多详情'}
      </button>
    </td>`;

    // 展开的详情行
    let detailRow = '';
    if (isExpanded) {
      const allFields = r._all_fields || {};
      // 排除已展示的浅层字段，只显示额外字段
      const shownKeys = new Set(TABLE_COLS.map(c => c.key));
      const extraFields = Object.entries(allFields).filter(([k]) => !shownKeys.has(k));

      const detailItems = extraFields.map(([k,v]) =>
        `<div class="detail-field"><span class="detail-label">${esc(k)}</span><span class="detail-value">${v!==''&&v!==null&&v!==undefined?esc(String(v)):'<em style="color:var(--gray-400)">空</em>'}</span></div>`
      ).join('');

      const srcBadgeClass = {
        '历史在投': 'detail-source-history',
        '创造营': 'detail-source-camp',
        '销售新增': 'detail-source-extra'
      };
      const srcLabel = r['达人来源'] || '';
      const badgeCls = srcBadgeClass[srcLabel] || '';

      detailRow = `<tr class="detail-row show"><td colspan="${TABLE_COLS.length+1}" class="detail-cell">
        <span class="detail-source-badge ${badgeCls}">📋 来自「${esc(srcLabel)}」完整字段 (${extraFields.length}项)</span>
        <div class="detail-grid">${detailItems}</div>
        <div class="detail-actions">
          <button class="btn-copy" onclick="event.stopPropagation();copyAll(${r._id})">📋 复制全部信息</button>
          <button class="btn-copy" onclick="event.stopPropagation();copyBasic(${r._id})">📋 仅复制基础信息</button>
        </div>
      </td></tr>`;
    }

    return `<tr class="${isExpanded?'expanded':''}">${cells}</tr>${detailRow}`;
  }).join('');
}

// ============================================================
// 展开/收起详情
// ============================================================
function toggleExpand(id) {
  expandedId = expandedId === id ? null : id;
  applyFilters();
  
  if (expandedId) {
    setTimeout(() => {
      const row = document.querySelector('tr.expanded');
      if (row) row.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }, 50);
  }
}

// ============================================================
// 排序
// ============================================================
let sortCol = null, sortDir = 'asc';

function sortBy(colKey) {
  if (sortCol === colKey) {
    sortDir = sortDir === 'asc' ? 'desc' : 'asc';
  } else {
    sortCol = colKey; sortDir = 'asc';
  }

  document.querySelectorAll('#tableHead th').forEach(th => {
    th.classList.remove('sorted-asc', 'sorted-desc');
    if (th.dataset.col === sortCol) th.classList.add(sortDir==='asc'?'sorted-asc':'sorted-desc');
  });

  const records = getFilteredData();
  records.sort((a,b) => {
    const va = a[sortCol]||''; const vb = b[sortCol]||'';
    return String(va).localeCompare(String(vb), 'zh-CN', {numeric:true}) * (sortDir==='asc'?1:-1);
  });
  
  const total = allData.length;
  renderBody(records);
  document.getElementById('resultInfo').textContent =
    `筛选结果：${records.length} / ${total} · 按 ${TABLE_COLS.find(c=>c.key===sortCol)?.label||sortCol} ${sortDir==='asc'?'↑升序':'↓降序'}`;
}

// ============================================================
// 工具函数
// ============================================================
function esc(s) {
  if (s===null||s===undefined) return '';
  const d=document.createElement('div'); d.textContent=s; return d.innerHTML.replace(/"/g,'&quot;');
}

function showToast(msg) {
  const t=document.getElementById('toast'); t.textContent=msg||'✅ 已复制到剪贴板';
  t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),1500);
}

function copyAll(id) {
  const r=allData.find(x=>x._id===id); if(!r)return;
  const lines=Object.entries(r._all_fields||{}).map(([k,v])=>`${k}: ${v}`).join('\n');
  navigator.clipboard.writeText(lines).then(()=>showToast('✅ 已复制全部字段'));
}

function copyBasic(id) {
  const r=allData.find(x=>x._id===id); if(!r)return;
  const lines=[
    `达人IP: ${r['达人IP']}`,`来源: ${r['达人来源']}`,`等级: ${r['等级']}`,
    `流转策略: ${r['流转策略']}`,`销售归属: ${r['销售归属']}`,
    `标签: ${r['达人标签']}`,`粉丝画像: ${r['粉丝画像']}`,
    `合作类型: ${r['合作类型']}`,`带货类型: ${r['带货类型']}`,
    `图书类目: ${r['图书类目倾向']}`,`课程类目: ${r['课程类目倾向']}`,
    `单价: ${r['带货单价']}`,`撮合状态: ${r['撮合状态']}`
  ].join('\n');
  navigator.clipboard.writeText(lines).then(()=>showToast('✅ 已复制基础信息'));
}

// 快捷键
document.addEventListener('keydown', e => {
  if ((e.ctrlKey||e.metaKey)&&e.key==='f'){e.preventDefault();document.getElementById('fSearch').focus();}
  if (e.key==='Escape') resetFilters();
});

init();
</script>
</body>
</html>
